#!/usr/bin/env bash
# =============================================================================
# NFT Manager - Konfigurasi Utama
# =============================================================================
# File konfigurasi utama untuk aplikasi NFT Manager
# Semua parameter yang dapat disesuaikan oleh pengguna disimpan di sini
# =============================================================================

# -----------------------------------------------------------------------------
# Informasi Aplikasi
# -----------------------------------------------------------------------------
APP_NAME="NFT Manager"
APP_VERSION="1.0.0"
APP_AUTHOR="NFT Manager Team"
APP_DESCRIPTION="Sistem Manajemen Firewall nftables untuk Ubuntu Server"

# -----------------------------------------------------------------------------
# Pengaturan Direktori
# -----------------------------------------------------------------------------
# Direktori untuk menyimpan backup konfigurasi nftables
BACKUP_DIR="${SCRIPT_DIR}/backups"

# Direktori untuk menyimpan log aktivitas
LOG_DIR="${SCRIPT_DIR}/logs"

# File log utama
LOG_FILE="${LOG_DIR}/nft-manager.log"

# Direktori untuk menyimpan file konfigurasi
CONFIG_DIR="${SCRIPT_DIR}/config"

# Direktori untuk menyimpan module
MODULE_DIR="${SCRIPT_DIR}/modules"

# -----------------------------------------------------------------------------
# Pengaturan nftables
# -----------------------------------------------------------------------------
# Nama tabel nftables yang digunakan
NFT_TABLE="inet"
NFT_TABLE_NAME="filter"

# Nama chain default
NFT_CHAIN_INPUT="input"
NFT_CHAIN_FORWARD="forward"
NFT_CHAIN_OUTPUT="output"

# Policy default untuk chain
NFT_POLICY_INPUT="drop"
NFT_POLICY_FORWARD="drop"
NFT_POLICY_OUTPUT="accept"

# -----------------------------------------------------------------------------
# Pengaturan Rollback
# -----------------------------------------------------------------------------
# Durasi rollback dalam detik (waktu tunggu konfirmasi sebelum rollback otomatis)
ROLLBACK_DURATION=60

# Enable/disable fitur rollback otomatis (true/false)
ROLLBACK_ENABLED=true

# -----------------------------------------------------------------------------
# Pengaturan Logging
# -----------------------------------------------------------------------------
# Level logging: DEBUG, INFO, WARNING, ERROR
LOG_LEVEL="INFO"

# Enable/disable logging (true/false)
LOG_ENABLED=true

# Maksimum ukuran file log dalam MB sebelum dirotasi
LOG_MAX_SIZE=10

# Jumlah file log yang disimpan saat rotasi
LOG_MAX_FILES=5

# -----------------------------------------------------------------------------
# Pengaturan Tampilan
# -----------------------------------------------------------------------------
# Tema tampilan: default, blue, green, dark
THEME="default"

# Tinggi minimum untuk dialog whiptail
WHIPTAIL_MIN_HEIGHT=20

# Lebar minimum untuk dialog whiptail
WHIPTAIL_MIN_WIDTH=70

# -----------------------------------------------------------------------------
# Pengaturan Keamanan
# -----------------------------------------------------------------------------
# Preset keamanan default: basic, standard, high
SECURITY_PRESET="standard"

# Rate limit untuk SSH (koneksi per menit)
SSH_RATE_LIMIT="5/minute"

# Rate limit untuk SYN flood
SYN_RATE_LIMIT="10/second"

# Rate limit untuk ICMP flood
ICMP_RATE_LIMIT="5/second"

# Rate limit untuk UDP flood
UDP_RATE_LIMIT="20/second"

# -----------------------------------------------------------------------------
# Pengaturan Backup
# -----------------------------------------------------------------------------
# Format backup: tar.gz
BACKUP_FORMAT="tar.gz"

# Jumlah backup maksimum yang disimpan (0 = unlimited)
BACKUP_MAX_FILES=20

# Prefix nama file backup
BACKUP_PREFIX="nft-backup"

# -----------------------------------------------------------------------------
# Pengaturan IPSet
# -----------------------------------------------------------------------------
# Nama set untuk whitelist
IPSET_WHITELIST_NAME="whitelist"

# Nama set untuk blacklist
IPSET_BLACKLIST_NAME="blacklist"

# -----------------------------------------------------------------------------
# Pengaturan Monitoring
# -----------------------------------------------------------------------------
# Interval refresh monitoring dalam detik
MONITOR_REFRESH_INTERVAL=5

# Jumlah top IP yang ditampilkan
MONITOR_TOP_IP_COUNT=10
